
name: Terraform Drift Detection

on:
  schedule:
    - cron: "0 2 * * *"

jobs:
  drift-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan -detailed-exitcode
